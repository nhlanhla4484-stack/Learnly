<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnly Lesson</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Nunito',sans-serif;background:#FAFAF8;margin:0;padding:20px;}
.container{max-width:700px;margin:auto;}
h1{font-family:'Baloo 2',cursive;font-size:32px;}
.card{background:white;padding:20px;border-radius:16px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.08);}
.option{border:1px solid #ddd;padding:10px;border-radius:10px;margin:8px 0;cursor:pointer;}
.option:hover{background:#f0f0ff;}
.correct{background:#d4f8e8;}
.wrong{background:#ffd6d6;}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading lesson...</h1>
  <div class="card" id="explanation"></div>
  <div class="card" id="examples"></div>
  <div class="card">
    <h3>Quick Quiz</h3>
    <div id="quiz"></div>
  </div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const grade = params.get("grade");
const subject = params.get("subject");
const topic = params.get("topic");

function generateLesson(){

  document.getElementById("title").innerText = topic;

  const lesson = {
    title: topic + " (Grade " + grade + ")",
    explanation: topic + " is an important concept in " + subject + ". Let’s learn it in a simple and fun way!",
    examples: [
      "Example 1: Practice " + topic,
      "Example 2: Try solving simple problems",
      "Example 3: Apply it in real life"
    ],
    quiz: {
      question: "What is the correct answer for " + topic + "?",
      options: ["Option A", "Option B", "Option C", "Option D"],
      answer: "Option A"
    }
  };

  renderLesson(lesson);
}

function renderLesson(lesson){

  document.getElementById("title").innerText = lesson.title;

  document.getElementById("explanation").innerHTML =
    "<h3>Learn</h3><p>" + lesson.explanation + "</p>";

  document.getElementById("examples").innerHTML =
    "<h3>Examples</h3><ul>" +
    lesson.examples.map(e => "<li>"+e+"</li>").join("") +
    "</ul>";

  const quizDiv = document.getElementById("quiz");

  quizDiv.innerHTML = "<p>"+lesson.quiz.question+"</p>";

  lesson.quiz.options.forEach(opt=>{
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt;

    div.onclick = ()=>{
      if(opt === lesson.quiz.answer){
        div.classList.add("correct");
      }else{
        div.classList.add("wrong");
      }
    };

    quizDiv.appendChild(div);
  });

}

generateLesson();

</script>

</body>
</html>
