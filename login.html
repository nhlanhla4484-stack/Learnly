<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Learnly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--purple:#5C4FD4;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#3C3489;--teal:#1D9E75;--teal-light:#E1F5EE;--amber:#EF9F27;--amber-light:#FAEEDA;--bg:#FAFAF8;--text:#1a1a2e;--text-muted:#6b6b8a;--border:rgba(0,0,0,0.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--purple);text-decoration:none}
a:hover{text-decoration:underline}
nav{padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:1px solid var(--border);background:white}
.nav-logo{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--purple);text-decoration:none}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
.card{background:white;border-radius:24px;border:1.5px solid var(--border);padding:40px;width:100%;max-width:420px}
.card-title{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px}
.card-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px}
input{width:100%;height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);background:white;outline:none;transition:border-color .2s}
input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(92,79,212,0.1)}
.forgot{text-align:right;font-size:12px;margin-top:-10px;margin-bottom:18px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;border:none;transition:all .2s;margin-top:8px}
.btn-primary{background:var(--purple);color:white}
.btn-primary:hover{background:var(--purple-dark)}
.btn-google{background:white;border:1.5px solid var(--border);color:var(--text)}
.btn-google:hover{border-color:var(--purple-mid)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:13px;color:var(--text-muted);font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1.5px;background:#eee}
.signup-link{text-align:center;margin-top:20px;font-size:14px;color:var(--text-muted)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Learnly ✦</a>
  <span style="font-size:14px;font-weight:700;color:var(--text-muted)">New here? <a href="signup.html">Sign up free</a></span>
</nav>
<div class="page">
  <div class="card">
    <div class="card-title">Welcome back! 👋</div>
    <p class="card-sub">Log in to continue your learning journey.</p>
    <button class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.3 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.4 13.1 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.5c-.5 2.8-2.1 5.1-4.5 6.7l7 5.4c4.1-3.8 6.5-9.4 6.5-16.1z"/><path fill="#FBBC05" d="M10.6 28.6A14.4 14.4 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.7l8.1-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7-5.4c-2.2 1.5-5 2.3-8.9 2.3-6.2 0-11.5-3.6-13.4-8.9l-8.1 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or email</div>
    <div class="field"><label>Email address</label><input type="email" placeholder="sarah@email.com"></div>
    <div class="field"><label>Password</label><input type="password" placeholder="Your password"></div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn btn-primary" onclick="window.location='app.html'">Log in →</button>
    <div class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</div>
</body>
</html>
